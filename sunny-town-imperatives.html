<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Sunny Town — Imperatives Adventure | Ready2Speak</title>
<style>
/* ============================================================
   1. DESIGN TOKENS
   ============================================================ */
:root{
  --sky-top:#bfe8ff;
  --sky-bottom:#eef9ff;
  --sun:#ffc93c;
  --sun-dark:#f4a300;
  --grass:#3faa5b;
  --grass-dark:#2d8a46;
  --road:#33415c;
  --road-line:#ffd23f;
  --coral:#ff6b5b;
  --coral-dark:#e2503f;
  --go:#2fae66;
  --go-dark:#1f8f52;
  --blue:#4fb0e8;
  --blue-dark:#2f8fc9;
  --purple:#9b6bd6;
  --navy:#1c2b3a;
  --ink-soft:#4a5b6c;
  --card:#ffffff;
  --card-border:#dbe9f5;
  --shadow-sm: 0 4px 10px rgba(28,43,58,.10);
  --shadow-md: 0 10px 25px rgba(28,43,58,.16);
  --shadow-lg: 0 18px 40px rgba(28,43,58,.22);
  --radius-lg: 22px;
  --radius-md: 14px;
  --radius-sm: 9px;
  --font-display:'Trebuchet MS','Segoe UI',Verdana,sans-serif;
  --font-body:'Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'Courier New',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  color:var(--navy);
  min-height:100vh;
  background:
    radial-gradient(circle at 88% 6%, rgba(255,201,60,.55), transparent 40%),
    linear-gradient(180deg,var(--sky-top) 0%, var(--sky-bottom) 55%, #eafaef 100%);
  overflow-x:hidden;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
}
.sr-only{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}
button{font-family:inherit;}
:focus-visible{outline:3px solid var(--blue-dark); outline-offset:3px; border-radius:6px;}

/* ============================================================
   2. LAYOUT — HEADER / ROAD PROGRESS / SCORE
   ============================================================ */
#app{display:flex; flex-direction:column; min-height:100vh;}

.topbar{
  position:sticky; top:0; z-index:50;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:14px;
  padding:10px 18px;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(8px);
  border-bottom:2px solid var(--card-border);
}
.brand{display:flex; align-items:center; gap:10px;}
.brand svg{width:44px; height:44px; flex:none;}
.brand-text h1{
  margin:0; font-family:var(--font-display); font-size:clamp(15px,3vw,20px);
  letter-spacing:.3px; color:var(--navy); line-height:1.1;
}
.brand-text p{margin:0; font-size:11px; color:var(--ink-soft); letter-spacing:.4px;}

.road-progress{width:100%; max-width:560px; justify-self:center;}
.road-progress svg{width:100%; height:46px; display:block;}
.road-progress-label{
  text-align:center; font-size:11px; color:var(--ink-soft); margin-top:2px;
  font-family:var(--font-mono);
}

.score-badge{
  display:flex; align-items:center; gap:6px;
  background:var(--navy); color:#fff;
  padding:8px 14px; border-radius:999px; box-shadow:var(--shadow-sm);
  font-family:var(--font-mono); font-weight:700; font-size:15px;
  white-space:nowrap;
}
.score-badge svg{width:18px; height:18px;}

/* ============================================================
   3. MAIN CONTENT
   ============================================================ */
main{
  flex:1; width:100%; max-width:920px; margin:0 auto;
  padding:22px 16px 60px;
}
.screen{animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

.screen-head{text-align:center; margin-bottom:20px;}
.eyebrow{
  display:inline-block; font-family:var(--font-mono); font-size:12px;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--blue-dark);
  background:#e7f5ff; border:1px solid #cfe9fb; padding:4px 12px; border-radius:999px;
  margin-bottom:10px;
}
.screen-head h2{
  font-family:var(--font-display); font-size:clamp(22px,4.2vw,32px);
  margin:0 0 8px; color:var(--navy);
}
.screen-head p{margin:0; color:var(--ink-soft); font-size:15px; max-width:560px; margin-inline:auto;}

.card{
  background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md); padding:22px;
}

/* Buttons */
.btn{
  border:none; cursor:pointer; font-weight:700; font-family:var(--font-body);
  border-radius:999px; padding:13px 26px; font-size:15.5px;
  display:inline-flex; align-items:center; gap:8px; justify-content:center;
  box-shadow:var(--shadow-sm); transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
}
.btn:hover{transform:translateY(-2px); box-shadow:var(--shadow-md);}
.btn:active{transform:translateY(0) scale(.97);}
.btn:disabled{opacity:.45; cursor:not-allowed; transform:none;}
.btn-go{background:linear-gradient(180deg,var(--go),var(--go-dark)); color:#fff;}
.btn-sky{background:linear-gradient(180deg,var(--blue),var(--blue-dark)); color:#fff;}
.btn-sun{background:linear-gradient(180deg,var(--sun),var(--sun-dark)); color:var(--navy);}
.btn-coral{background:linear-gradient(180deg,var(--coral),var(--coral-dark)); color:#fff;}
.btn-ghost{background:#fff; color:var(--navy); border:2px solid var(--card-border);}
.btn-lg{padding:16px 34px; font-size:18px;}
.btn svg{width:18px; height:18px;}

.actions-row{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:22px;}

/* Listen button */
.listen-bar{display:flex; justify-content:center; margin-bottom:18px;}
.listen-btn{
  display:flex; align-items:center; gap:10px; background:#fff;
  border:2px solid var(--sun-dark); color:var(--navy); border-radius:999px;
  padding:10px 20px; font-weight:700; cursor:pointer; box-shadow:var(--shadow-sm);
}
.listen-btn svg{width:22px; height:22px;}
.listen-btn.speaking{animation:pulseRing 1s ease-in-out infinite;}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(244,163,0,.45);} 50%{box-shadow:0 0 0 8px rgba(244,163,0,0);}}

.prompt-text{
  text-align:center; font-family:var(--font-display); font-size:clamp(18px,3vw,24px);
  color:var(--navy); margin:2px 0 18px;
}

/* Option grid (Activity 1) */
.option-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px;
}
.option-card{
  background:#fff; border:2px solid var(--card-border); border-radius:var(--radius-md);
  padding:14px 10px 12px; cursor:pointer; text-align:center; transition:transform .15s, border-color .15s, box-shadow .15s;
}
.option-card:hover{transform:translateY(-3px); border-color:var(--blue); box-shadow:var(--shadow-sm);}
.option-card svg{width:64px; height:64px;}
.option-card .cap{display:block; font-size:13.5px; font-weight:600; margin-top:6px; color:var(--navy);}
.option-card.correct{background:#e8fbef; border-color:var(--go); animation:pop .4s ease;}
.option-card.incorrect{background:#ffecea; border-color:var(--coral); animation:shake .45s ease;}
.option-card.dim{opacity:.5; pointer-events:none;}

@keyframes pop{0%{transform:scale(1);} 40%{transform:scale(1.08);} 100%{transform:scale(1);}}
@keyframes shake{
  10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);}
  30%,50%,70%{transform:translateX(-8px);} 40%,60%{transform:translateX(8px);}
}

/* Feedback toast */
.feedback{
  display:flex; align-items:center; gap:10px; justify-content:center;
  font-family:var(--font-display); font-size:17px; font-weight:700;
  padding:12px 18px; border-radius:var(--radius-md); margin:16px auto 0; max-width:420px;
  animation:slideDown .35s ease both;
}
.feedback.good{background:#e6faed; color:var(--go-dark); border:2px solid var(--go);}
.feedback.bad{background:#fff0ee; color:var(--coral-dark); border:2px solid var(--coral);}
@keyframes slideDown{from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);}}

/* Progress within an activity */
.mini-progress{max-width:420px; margin:0 auto 16px;}
.mini-progress-track{
  height:10px; border-radius:999px; background:#e2eef7; overflow:hidden;
}
.mini-progress-fill{
  height:100%; border-radius:999px; background:linear-gradient(90deg,var(--sun),var(--go));
  transition:width .4s ease;
}
.mini-progress-text{text-align:center; font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); margin-top:4px;}

/* ============================================================
   4. ACTIVITY 2 — DRAG THE COMMAND
   ============================================================ */
.city-scene{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:14px; margin-bottom:24px;
}
.drop-zone{
  background:#f5fbff; border:2.5px dashed #b9dcf2; border-radius:var(--radius-md);
  padding:14px 8px; text-align:center; min-height:126px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; position:relative; transition:border-color .15s, background .15s;
}
.drop-zone svg{width:68px; height:68px;}
.drop-zone.hover{border-color:var(--blue-dark); background:#e7f5ff;}
.drop-zone.filled{border-style:solid; background:#e8fbef; border-color:var(--go);}
.drop-zone.wrong-flash{border-color:var(--coral); background:#fff0ee; animation:shake .45s ease;}
.drop-zone .placed-card{
  position:absolute; top:-14px; background:var(--go); color:#fff; font-size:11px; font-weight:700;
  padding:3px 8px; border-radius:999px; box-shadow:var(--shadow-sm);
}

.card-tray{
  display:flex; flex-wrap:wrap; gap:10px; justify-content:center; padding:14px;
  background:#fff; border:1px solid var(--card-border); border-radius:var(--radius-md);
}
.command-card{
  background:linear-gradient(180deg,#ffffff,#f4f9ff); border:2px solid var(--blue);
  color:var(--navy); font-weight:700; font-size:14px; padding:11px 16px; border-radius:999px;
  cursor:grab; touch-action:none; user-select:none; box-shadow:var(--shadow-sm);
  transition:transform .12s, box-shadow .12s, opacity .2s;
}
.command-card.negative{border-color:var(--coral); background:linear-gradient(180deg,#ffffff,#fff5f3);}
.command-card.selected{outline:3px solid var(--sun-dark); outline-offset:2px;}
.command-card.dragging{opacity:.35;}
.command-card.placed{display:none;}
.command-card:active{cursor:grabbing;}
.ghost-card{
  position:fixed; z-index:999; pointer-events:none; transform:translate(-50%,-50%) scale(1.06);
  box-shadow:var(--shadow-lg);
}

/* ============================================================
   5. ACTIVITY 3 — IS IT CORRECT?
   ============================================================ */
.situation-card{text-align:center;}
.situation-illustration{width:min(100%,320px); margin:0 auto 18px; display:block;}
.choice-pair{display:flex; gap:16px; justify-content:center; flex-wrap:wrap;}
.choice-btn{
  min-width:150px; background:#fff; border:2.5px solid var(--card-border);
  border-radius:var(--radius-md); padding:16px 20px; font-family:var(--font-display);
  font-size:17px; font-weight:700; cursor:pointer; color:var(--navy); transition:all .15s;
}
.choice-btn:hover{border-color:var(--blue); transform:translateY(-2px);}
.choice-btn.correct{background:#e6faed; border-color:var(--go); color:var(--go-dark); animation:pop .4s ease;}
.choice-btn.incorrect{background:#fff0ee; border-color:var(--coral); color:var(--coral-dark); animation:shake .45s ease;}

/* ============================================================
   6. ACTIVITY 4 — BUILD THE SENTENCE
   ============================================================ */
.sentence-slot-row{
  display:flex; flex-wrap:wrap; gap:8px; justify-content:center; min-height:58px;
  padding:12px; background:#f5fbff; border:2px dashed #b9dcf2; border-radius:var(--radius-md); margin-bottom:18px;
}
.slot{
  min-width:64px; height:44px; border-bottom:3px solid var(--blue); display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:16px; color:var(--navy);
}
.slot.has-word{border-bottom-color:var(--go);}
.word-bank{display:flex; flex-wrap:wrap; gap:10px; justify-content:center;}
.word-tile{
  background:#fff; border:2px solid var(--sun-dark); border-radius:var(--radius-sm);
  padding:10px 16px; font-family:var(--font-display); font-size:16px; cursor:pointer;
  box-shadow:var(--shadow-sm); transition:transform .12s, opacity .2s;
}
.word-tile:hover{transform:translateY(-2px);}
.word-tile.used{opacity:.25; pointer-events:none;}

/* ============================================================
   7. ACTIVITY 5 — SPEAKING CHALLENGE
   ============================================================ */
.mic-btn{
  width:88px; height:88px; border-radius:50%; border:none; cursor:pointer;
  background:radial-gradient(circle at 35% 30%, #ff9a8b, var(--coral-dark));
  color:#fff; box-shadow:var(--shadow-md); display:flex; align-items:center; justify-content:center;
  margin:6px auto 10px;
}
.mic-btn svg{width:38px; height:38px;}
.mic-btn.listening{animation:micPulse 1.1s ease-in-out infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,91,.45);} 50%{box-shadow:0 0 0 14px rgba(255,107,91,0);}}
.heard-text{
  text-align:center; font-family:var(--font-mono); font-size:14px; color:var(--ink-soft);
  min-height:20px; margin-top:8px;
}

/* ============================================================
   8. FINAL CHALLENGE — CITY MAP
   ============================================================ */
.town-map{
  position:relative; padding:16px 14px 14px; border-radius:var(--radius-lg);
  background:linear-gradient(180deg,#eafaf1,#eafaf1 62%, #33415c 62%, #33415c 78%, #eafaf1 78%);
  margin-bottom:6px;
}
.town-map-road-line{
  position:absolute; left:14px; right:14px; top:calc(62% + 8px); height:2px;
  background:repeating-linear-gradient(90deg,var(--road-line) 0 14px, transparent 14px 26px);
  pointer-events:none;
}
.map-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; position:relative;
}
.map-tile{
  background:#fff; border:2.5px solid var(--card-border); border-radius:var(--radius-md);
  padding:12px 8px 10px; cursor:pointer; text-align:center; transition:transform .15s ease, border-color .15s, box-shadow .15s;
}
.map-tile svg{width:52px; height:52px;}
.map-tile .cap{display:block; font-size:12px; font-weight:700; margin-top:4px; color:var(--navy);}
.map-tile:hover{transform:translateY(-3px); border-color:var(--blue); box-shadow:var(--shadow-sm);}
.map-tile:focus-visible{transform:translateY(-3px);}
.map-tile.correct-flash{background:#e8fbef; border-color:var(--go); animation:pop .4s ease;}
.map-tile.wrong-flash{background:#ffecea; border-color:var(--coral); animation:shake .45s ease;}
.map-tile.dim{opacity:.5; pointer-events:none;}

/* ============================================================
   9. RESULTS SCREEN
   ============================================================ */
.results-wrap{text-align:center;}
.stars-row{font-size:44px; margin:10px 0 6px; letter-spacing:6px;}
.score-big{font-family:var(--font-mono); font-size:46px; font-weight:700; color:var(--navy); margin:6px 0;}
.results-msg{font-family:var(--font-display); font-size:22px; color:var(--go-dark); margin-bottom:6px;}
.results-breakdown{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:10px; margin:22px 0; text-align:left;
}
.results-breakdown .item{
  background:#fff; border:1px solid var(--card-border); border-radius:var(--radius-md); padding:12px 14px;
  display:flex; justify-content:space-between; align-items:center; font-size:14px;
}
.results-breakdown .item b{font-family:var(--font-mono);}

#confettiLayer{position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden;}

/* decorative footer strip */
.grass-strip{
  height:26px; background:linear-gradient(180deg,var(--grass),var(--grass-dark));
  border-top:4px solid #2a7a41; margin-top:auto;
}

/* Responsive tweaks */
@media (max-width:640px){
  .topbar{grid-template-columns:auto 1fr auto; gap:8px; padding:8px 10px;}
  .brand-text p{display:none;}
  .road-progress{display:none;}
  .score-badge{padding:6px 10px; font-size:13px;}
  .option-card svg{width:52px; height:52px;}
  .choice-btn{min-width:120px; padding:13px 14px; font-size:15px;}
}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="34" fill="#ffc93c"/><circle cx="50" cy="50" r="34" fill="none" stroke="#f4a300" stroke-width="4"/><g stroke="#f4a300" stroke-width="5" stroke-linecap="round"><line x1="50" y1="6" x2="50" y2="16"/><line x1="50" y1="84" x2="50" y2="94"/><line x1="6" y1="50" x2="16" y2="50"/><line x1="84" y1="50" x2="94" y2="50"/><line x1="18" y1="18" x2="25" y2="25"/><line x1="75" y1="75" x2="82" y2="82"/><line x1="82" y1="18" x2="75" y2="25"/><line x1="25" y1="75" x2="18" y2="82"/></g><rect x="30" y="44" width="40" height="12" rx="6" fill="#1c2b3a"/><path d="M38 66 Q50 74 62 66" stroke="#1c2b3a" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
      <div class="brand-text">
        <h1>Sunny Town</h1>
        <p>An Imperatives Adventure · Ready2Speak</p>
      </div>
    </div>

    <div class="road-progress" aria-hidden="true">
      <svg viewBox="0 0 560 46" id="roadSvg">
        <path id="roadPath" d="M10,23 C120,5 180,42 280,23 C380,5 440,42 550,23" stroke="#33415c" stroke-width="14" fill="none" stroke-linecap="round"/>
        <path d="M10,23 C120,5 180,42 280,23 C380,5 440,42 550,23" stroke="#ffd23f" stroke-width="2" stroke-dasharray="8 8" fill="none"/>
        <g id="roadStops"></g>
        <g id="roadCar" transform="translate(10,23)">
          <g transform="translate(-13,-9)">
            <rect x="0" y="7" width="26" height="10" rx="4" fill="#ff6b5b"/>
            <rect x="5" y="2" width="14" height="8" rx="3" fill="#ff6b5b"/>
            <rect x="7" y="3.5" width="4.5" height="5" rx="1" fill="#eafaff"/>
            <rect x="13" y="3.5" width="4.5" height="5" rx="1" fill="#eafaff"/>
            <circle cx="6.5" cy="18" r="3.4" fill="#1c2b3a"/>
            <circle cx="19.5" cy="18" r="3.4" fill="#1c2b3a"/>
          </g>
        </g>
      </svg>
      <div class="road-progress-label" id="roadLabel">Start your trip →</div>
    </div>

    <div class="score-badge" aria-live="polite">
      <svg viewBox="0 0 24 24" fill="#ffc93c"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7-6.2-3.9L5.8 21l1.6-7-5.4-4.7 7.1-.6z"/></svg>
      <span id="scoreCount">0</span>
    </div>
  </header>

  <main id="main" role="main"></main>

  <div id="confettiLayer" aria-hidden="true"></div>
  <div id="srLive" class="sr-only" role="status" aria-live="polite"></div>
  <div class="grass-strip"></div>
</div>

<script>
/* ============================================================
   SUNNY TOWN — IMPERATIVES ADVENTURE
   Vanilla JS, no external assets/libraries. Fully offline.
   Sections:
     A. Palette + icon library (inline SVG)
     B. Audio: speech synthesis + Web Audio sound effects
     C. Speech recognition helper
     D. App state, road progress, navigation
     E. Activity 1 — Listen & Choose
     F. Activity 2 — Drag the Command
     G. Activity 3 — Is It Correct?
     H. Activity 4 — Build the Sentence
     I. Activity 5 — Speaking Challenge
     J. Final Challenge — City Map
     K. Start / Results screens + confetti
   ============================================================ */
(function(){
"use strict";

/* ------------------------------------------------------------
   A. PALETTE + ICON LIBRARY
   ------------------------------------------------------------ */
const C = {
  navy:'#1c2b3a', wall:'#fff6e6', wall2:'#ffe7c2', roof:'#ff6b5b', roof2:'#e2503f',
  blue:'#4fb0e8', blueD:'#2f8fc9', grass:'#3faa5b', grassD:'#2d8a46',
  sun:'#ffc93c', sunD:'#f4a300', go:'#2fae66', goD:'#1f8f52',
  coral:'#ff6b5b', coralD:'#e2503f', purple:'#9b6bd6', purpleD:'#7a4fc0',
  white:'#ffffff', brown:'#a9713a', skin:'#f4c39a', hair:'#4a3223', paper:'#f5fbff'
};

function svg(inner, vb){ vb = vb || 100; return '<svg viewBox="0 0 '+vb+' '+vb+'" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">'+inner+'</svg>'; }

const ICONS = {
  bank: svg('<rect x="8" y="55" width="84" height="34" rx="3" fill="'+C.wall+'"/><polygon points="50,10 92,42 8,42" fill="'+C.roof+'"/><rect x="8" y="42" width="84" height="8" fill="'+C.roof2+'"/>'+
    ['20','35','50','65','80'].map(function(x){return '<rect x="'+(+x-3)+'" y="50" width="6" height="34" fill="'+C.blueD+'"/>';}).join('')+
    '<rect x="4" y="89" width="92" height="6" rx="2" fill="'+C.navy+'"/>'),

   B. AUDIO — SPEECH SYNTHESIS + WEB AUDIO SOUND EFFECTS
   ------------------------------------------------------------ */
let audioCtx = null;
function getCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
  }
  return audioCtx;
}
function beep(freq,start,dur,type,vol){
  const ctx = getCtx(); if(!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type = type||'sine'; osc.frequency.setValueAtTime(freq, ctx.currentTime+start);
  gain.gain.setValueAtTime(0, ctx.currentTime+start);
  gain.gain.linearRampToValueAtTime(vol||0.2, ctx.currentTime+start+0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(ctx.currentTime+start); osc.stop(ctx.currentTime+start+dur+0.05);
}
function playCorrect(){ beep(523.25,0,.14,'sine',.22); beep(659.25,.12,.14,'sine',.22); beep(783.99,.24,.22,'sine',.24); }
function playIncorrect(){ beep(180,0,.22,'square',.12); beep(140,.12,.26,'square',.10); }
function playCelebration(){
  const notes = [523.25,587.33,659.25,698.46,783.99,880,987.77,1046.5];
  notes.forEach(function(f,i){ beep(f, i*0.09, .2, 'triangle', .16); });
}
function playClick(){ beep(880,0,.06,'sine',.10); }

function speak(text, rate){
  if(!('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate || 0.85; u.pitch = 1; u.lang = 'en-US';
    const btn = document.getElementById('listenBtn');
    if(btn){ btn.classList.add('speaking'); u.onend = function(){ btn.classList.remove('speaking'); }; }
    window.speechSynthesis.speak(u);
  }catch(e){/* silent */}
  const live = document.getElementById('srLive'); if(live) live.textContent = text;
}

const SCREENS = ['start','act1','act2','act3','act4','act5','final','results'];

const state = {
  idx: 0,
  score: 0,
  total: 0,
  breakdown: [] // {name, correct, total}
};

function resetState(){
  state.idx = 0; state.score = 0; state.total = 0; state.breakdown = [];
  updateScoreBadge(); updateRoad();
}

function updateScoreBadge(){
  document.getElementById('scoreCount').textContent = state.score;
}

function roadLen(path){
  try{ return path.getTotalLength(); }catch(e){ return 540; }
}
function roadPoint(path, len, frac){
  try{ return path.getPointAtLength(len*frac); }catch(e){ return {x:10+540*frac, y:23}; }
}

function buildRoadStops(){
  const g = document.getElementById('roadStops');
  const path = document.getElementById('roadPath');
  if(!g || !path) return;
  const len = roadLen(path);
  let html = '';
  const n = SCREENS.length - 2; // exclude start & results
  for(let i=1;i<=n;i++){
    const pt = roadPoint(path, len, i/(n+1));
    html += '<circle cx="'+pt.x.toFixed(1)+'" cy="'+pt.y.toFixed(1)+'" r="4.5" fill="#fff" stroke="#33415c" stroke-width="2" data-stop="'+i+'"></circle>';
  }
  g.innerHTML = html;
}

function updateRoad(){
  const path = document.getElementById('roadPath');
  const car = document.getElementById('roadCar');
  const label = document.getElementById('roadLabel');
  if(!path || !car || !label) return;
  const len = roadLen(path);
  const frac = SCREENS.length<=1 ? 0 : state.idx/(SCREENS.length-1);
  const pt = roadPoint(path, len, frac);
  car.setAttribute('transform','translate('+pt.x.toFixed(1)+','+pt.y.toFixed(1)+')');
  document.querySelectorAll('#roadStops circle').forEach(function(c){
    const s = +c.getAttribute('data-stop');
    c.setAttribute('fill', s <= state.idx ? '#2fae66' : '#fff');
  });
  const names = {start:'Ready to start!',act1:'Listen & Choose',act2:'Drag the Command',act3:'Is It Correct?',act4:'Build the Sentence',act5:'Speaking Challenge',final:'Final Challenge',results:'Trip complete! 🎉'};
  label.textContent = names[SCREENS[state.idx]] || '';
}

function goTo(screenId){
  state.idx = SCREENS.indexOf(screenId);
  updateRoad();
  window.scrollTo({top:0,behavior:'smooth'});
  RENDER[screenId]();
}

function recordActivity(name, correct, total){
  state.breakdown.push({name:name, correct:correct, total:total});
}

function addScore(n){ state.score += n; updateScoreBadge(); }

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}

function paintAct1(){

function wireDragDrop(){
  const tray = document.getElementById('cardTray');
  const scene = document.getElementById('cityScene');
  let selectedCard = null; // for click/tap fallback
  let dragCard = null;

  function checkDrop(card, zoneEl){
    const cardZone = card.getAttribute('data-zone');
    const zoneId = zoneEl.getAttribute('data-zone');
    const cmd = decodeURIComponent(card.getAttribute('data-cmd'));
    if(cardZone === zoneId){
      zoneEl.classList.remove('hover','wrong-flash');
      zoneEl.classList.add('filled');
      const tag = document.createElement('div');
      tag.className = 'placed-card'; tag.textContent = '✔ ' + cmd;
      zoneEl.appendChild(tag);
      card.classList.add('placed');
      playCorrect(); addScore(10);
      act2State.correctCount++; act2State.placed++;
      showFeedback(document.querySelector('.card'), true, randomGood());
    } else {
      zoneEl.classList.add('wrong-flash');
      playIncorrect();
      showFeedback(document.querySelector('.card'), false, randomBad());
      setTimeout(function(){ zoneEl.classList.remove('wrong-flash'); }, 500);
    }
    document.querySelectorAll('.mini-progress-text')[0] && (document.querySelectorAll('.mini-progress-text')[0].textContent = 'Placed '+act2State.placed+' of '+ACT2_DATA.length);
    document.querySelector('.mini-progress-fill').style.width = (100*act2State.placed/ACT2_DATA.length)+'%';
    if(act2State.placed >= ACT2_DATA.length){
      state.total += ACT2_DATA.length;
      recordActivity('Drag the Command', act2State.correctCount, ACT2_DATA.length);
      setTimeout(function(){ goTo('act3'); }, 1100);
    }
  }

  // Native HTML5 drag (desktop mouse)
  tray.querySelectorAll('.command-card').forEach(function(card){
    card.addEventListener('dragstart', function(e){
      dragCard = card; card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.getAttribute('data-zone'));
    });
    card.addEventListener('dragend', function(){ card.classList.remove('dragging'); });

    // Click / tap fallback (works on mobile + keyboard, more reliable than HTML5 DnD)
    card.addEventListener('click', function(){
      if(card.classList.contains('placed')) return;
      tray.querySelectorAll('.command-card').forEach(function(c){ c.classList.remove('selected'); });
      selectedCard = card; card.classList.add('selected'); playClick();
    });
    card.addEventListener('keydown', function(e){
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); card.click(); }
    });
  });

  scene.querySelectorAll('.drop-zone').forEach(function(zone){
    zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('hover'); });
    zone.addEventListener('dragleave', function(){ zone.classList.remove('hover'); });
    zone.addEventListener('drop', function(e){
      e.preventDefault(); zone.classList.remove('hover');
      if(!dragCard || dragCard.classList.contains('placed')) return;
      checkDrop(dragCard, zone); dragCard = null;
    });
    zone.addEventListener('click', function(){
      if(zone.classList.contains('filled')) return;
      if(selectedCard){ checkDrop(selectedCard, zone); selectedCard.classList.remove('selected'); selectedCard = null; }
    });
    zone.addEventListener('keydown', function(e){
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); zone.click(); }
    });
  });
}

const ACT4_DATA = [
  {words:['Walk','to','the','library'], answer:'Walk to the library.'},
  {words:["Don't",'drive','to','school'], answer:"Don't drive to school."},
  {words:['Take','the','bus'], answer:'Take the bus.'},
  {words:["Don't",'cross','the','street'], answer:"Don't cross the street."},
  {words:['Go','to','the','hospital'], answer:'Go to the hospital.'},
  {words:["Don't",'open','the','door'], answer:"Don't open the door."}
];

let act4State = {i:0, correct:0, order:[], built:[]};

function renderAct4(){
  act4State = {i:0, correct:0, order: shuffle(ACT4_DATA.map(function(_,idx){return idx;})), built:[]};
  paintAct4();
}
function paintAct4(){
  const q = ACT4_DATA[act4State.order[act4State.i]];
  act4State.built = new Array(q.words.length).fill(null);
  const shuffled = shuffle(q.words.map(function(w,i){return {w:w,orig:i};}));
  const main = document.getElementById('main');
  main.innerHTML =
    '<section class="screen" aria-label="Activity 4: Build the Sentence">'+
      '<div class="screen-head"><span class="eyebrow">Activity 4 · Sentence Building</span><h2>Build the Sentence 🧩</h2><p>Tap or drag the words in the right order.</p></div>'+
      miniProgress(act4State.i+1, ACT4_DATA.length)+
      '<div class="card">'+
        '<div class="sentence-slot-row" id="slotRow"></div>'+
        '<div class="word-bank" id="wordBank"></div>'+
        '<div class="actions-row"><button class="btn btn-ghost" id="resetSentence">↺ Reset</button></div>'+
        '<div id="fbHost"></div>'+
      '</div>'+
    '</section>';

  const slotRow = document.getElementById('slotRow');
  slotRow.innerHTML = q.words.map(function(_,i){ return '<div class="slot" data-slot="'+i+'">&nbsp;</div>'; }).join('');
  const wordBank = document.getElementById('wordBank');
  wordBank.innerHTML = shuffled.map(function(item,i){
    return '<button class="word-tile" data-word-idx="'+i+'" data-orig="'+item.orig+'" draggable="true">'+item.w+'</button>';
  }).join('');

  let placedCount = 0;
  let answered = false;

  function tryComplete(){
    if(placedCount < q.words.length || answered) return;
    answered = true;
    const built = act4State.built.map(function(x){return x.w;}).join(' ') + '.';
    const good = built.toLowerCase() === q.answer.toLowerCase();
    if(good){ playCorrect(); addScore(10); act4State.correct++; } else { playIncorrect(); }
    state.total++;
    showFeedback(document.querySelector('.card'), good, good?randomGood():('Correct answer: "'+q.answer+'"'));
    speak(q.answer, 0.85);
    setTimeout(function(){
      act4State.i++;
      if(act4State.i < ACT4_DATA.length){ paintAct4(); }
      else { recordActivity('Build the Sentence', act4State.correct, ACT4_DATA.length); goTo('act5'); }
    }, 1600);
  }

  function placeWord(tile){
    if(tile.classList.contains('used') || answered) return;
    const slot = slotRow.querySelector('.slot:not(.has-word)');
    if(!slot) return;
    const idx = +slot.getAttribute('data-slot');
    const word = tile.textContent;
    slot.textContent = word; slot.classList.add('has-word');
    tile.classList.add('used');
    act4State.built[idx] = {w:word, tileIdx:tile.getAttribute('data-word-idx')};
    placedCount++;
    playClick();
    tryComplete();
  }

  wordBank.querySelectorAll('.word-tile').forEach(function(tile){
    tile.addEventListener('click', function(){ placeWord(tile); });
    tile.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); placeWord(tile);} });
    tile.addEventListener('dragstart', function(e){ e.dataTransfer.setData('text/plain', tile.getAttribute('data-word-idx')); });
  });
  slotRow.querySelectorAll('.slot').forEach(function(slot){
    slot.addEventListener('dragover', function(e){ e.preventDefault(); });
    slot.addEventListener('drop', function(e){
      e.preventDefault();
      const idx = e.dataTransfer.getData('text/plain');
      const tile = wordBank.querySelector('[data-word-idx="'+idx+'"]');
      if(tile && !slot.classList.contains('has-word')) placeWord(tile);
    });
  });

  document.getElementById('resetSentence').addEventListener('click', function(){
    if(answered) return;
    slotRow.querySelectorAll('.slot').forEach(function(s){ s.textContent=''; s.classList.remove('has-word'); s.innerHTML='&nbsp;'; });
    wordBank.querySelectorAll('.word-tile').forEach(function(t){ t.classList.remove('used'); });
    act4State.built = new Array(q.words.length).fill(null);
    placedCount = 0;
  });
}

const ACT5_DATA = [

];

let act5State = {i:0, correct:0, skipped:0};

function renderAct5(){
  act5State = {i:0, correct:0, skipped:0};
  paintAct5();
}
function normalizeSpeech(s){
  return s.toLowerCase().replace(/[.,!?]/g,'').replace(/\s+/g,' ').trim();
}
function paintAct5(){
  const q = ACT5_DATA[act5State.i];
  const main = document.getElementById('main');
  const srAvailable = !!SRClass;
  main.innerHTML =
    '<section class="screen" aria-label="Activity 5: Speaking Challenge">'+
      '<div class="screen-head"><span class="eyebrow">Activity 5 · Reading &amp; Speaking</span><h2>Speaking Challenge 🎤</h2><p>Look at the picture, read the sentence, then press the microphone and say it aloud.</p></div>'+
      miniProgress(act5State.i+1, ACT5_DATA.length)+
      '<div class="card situation-card">'+
        '<div class="situation-illustration">'+ICONS[q.icon]+'</div>'+
        '<div class="prompt-text">"'+q.sentence+'"</div>'+
        (srAvailable
          ? ('<button class="mic-btn" id="micBtn" aria-label="Start recording"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>'+
             '<div class="heard-text" id="heardText">Tap the microphone and read the sentence aloud.</div>')
          : '<p style="color:var(--coral-dark);font-weight:600;">Speech recognition is not supported in your browser.</p>'
        )+
        '<div class="actions-row">'+
          '<button class="btn btn-ghost" id="skipBtn">Skip →</button>'+
        '</div>'+
        '<div id="fbHost"></div>'+
      '</div>'+
    '</section>';

  function nextQuestion(){
    act5State.i++;
    if(act5State.i < ACT5_DATA.length){ paintAct5(); }
    else { recordActivity('Speaking Challenge', act5State.correct, ACT5_DATA.length - act5State.skipped || 1); goTo('final'); }
  }
  document.getElementById('skipBtn').addEventListener('click', function(){ act5State.skipped++; nextQuestion(); });

  if(srAvailable){
    const micBtn = document.getElementById('micBtn');
    const heard = document.getElementById('heardText');
    let recognizing = false;
    micBtn.addEventListener('click', function(){
      if(recognizing) return;
      const rec = new SRClass();
      rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 3;
      recognizing = true; micBtn.classList.add('listening');
      heard.textContent = 'Listening…';
      rec.onresult = function(ev){
        const said = normalizeSpeech(ev.results[0][0].transcript);
        heard.textContent = 'You said: "' + ev.results[0][0].transcript + '"';
        const good = q.expect.some(function(exp){ return said.indexOf(normalizeSpeech(exp)) !== -1; });
        state.total++;
        if(good){ playCorrect(); addScore(10); act5State.correct++; } else { playIncorrect(); }
        showFeedback(document.querySelector('.card'), good, good? randomGood() : ('Try reading: "'+q.sentence+'"'));
        setTimeout(nextQuestion, 1600);
      };
      rec.onerror = function(){ recognizing=false; micBtn.classList.remove('listening'); heard.textContent = "Didn't catch that. Try again or skip."; };
      rec.onend = function(){ recognizing=false; micBtn.classList.remove('listening'); };
      try{ rec.start(); }catch(e){ recognizing=false; micBtn.classList.remove('listening'); }
    });
  }
}

  const main = document.getElementById('main');
  main.innerHTML =
    '<section class="screen" aria-label="Final Challenge: City Map">'+
      '<div class="screen-head"><span class="eyebrow">Final Challenge · City Map</span><h2>Explore Sunny Town 🗺️</h2><p>Listen to the direction and click the correct place on the map.</p></div>'+
      miniProgress(finalState.i+1, finalState.order.length)+
      '<div class="card">'+
        '<div class="listen-bar"><button class="listen-btn" id="listenBtn"><svg viewBox="0 0 24 24" fill="none" stroke="#1c2b3a" stroke-width="2"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 8a5 5 0 010 8"/><path d="M19 5a9 9 0 010 14"/></svg> Listen Again</button></div>'+
        '<div class="prompt-text" id="promptText">"'+q.text+'"</div>'+
        buildTownMapHTML()+
        '<div id="fbHost"></div>'+
      '</div>'+
    '</section>';

  speak(q.text, 0.85);
  document.getElementById('listenBtn').addEventListener('click', function(){ speak(q.text,0.85); });

  let answered = false;
  document.querySelectorAll('.map-tile').forEach(function(g){
    function handle(){
      if(answered) return; answered = true;
      const good = g.getAttribute('data-key') === q.target;
      document.querySelectorAll('.map-tile').forEach(function(t){ if(t!==g) t.classList.add('dim'); });
      g.classList.remove('dim');
      g.classList.add(good?'correct-flash':'wrong-flash');
      if(good){ playCorrect(); addScore(10); finalState.correct++; } else {
        playIncorrect();
        const correctEl = document.querySelector('.map-tile[data-key="'+q.target+'"]');
        if(correctEl){ correctEl.classList.remove('dim'); correctEl.classList.add('correct-flash'); }
      }
      state.total++;
      showFeedback(document.querySelector('.card'), good, good?randomGood():randomBad());
      setTimeout(function(){
        finalState.i++;
        if(finalState.i < finalState.order.length){ paintFinal(); }
        else { recordActivity('Final Challenge', finalState.correct, finalState.order.length); goTo('results'); }
      }, 1300);
    }
    g.addEventListener('click', handle);
    g.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); handle(); } });
  });
}

/* ============================================================
   K. START / RESULTS SCREENS + CONFETTI
   ============================================================ */
function renderStart(){
  resetState();
  const main = document.getElementById('main');
  main.innerHTML =
    '<section class="screen" aria-label="Welcome">'+
      '<div class="screen-head">'+
        '<span class="eyebrow">Ready2Speak · A1 English</span>'+
        '<h2>Welcome to Sunny Town!</h2>'+
        '<p>Practice giving directions and instructions with affirmative and negative imperatives. Listen, drag, choose, build, and speak your way across town!</p>'+
      '</div>'+
      '<div class="card" style="text-align:center;">'+
        '<div style="width:140px;margin:0 auto 14px;">'+ICONS.mascotHappy+'</div>'+
        '<p style="max-width:480px;margin:0 auto 18px;color:var(--ink-soft);">'+
        'You will complete <b>6 stops</b>: Listen &amp; Choose, Drag the Command, Is It Correct?, Build the Sentence, Speaking Challenge, and the Final City Map Challenge. Turn your sound on! 🔊</p>'+
        '<button class="btn btn-go btn-lg" id="startBtn">🚗 Start the Trip</button>'+
      '</div>'+
    '</section>';
  document.getElementById('startBtn').addEventListener('click', function(){ getCtx(); playClick(); goTo('act1'); });
}

function renderResults(){
  const main = document.getElementById('main');
  const pct = state.total ? Math.round(100*state.score/(state.total*10)) : 0;
  let stars = pct>=90?5:pct>=75?4:pct>=55?3:pct>=35?2:1;
  const starRow = '★'.repeat(stars) + '☆'.repeat(5-stars);
  const msg = pct>=70 ? 'Excellent! You know Sunny Town very well!' : 'Keep practicing! You are learning fast.';
  main.innerHTML =
    '<section class="screen results-wrap" aria-label="Results">'+
      '<div class="screen-head"><span class="eyebrow">Trip Complete</span><h2>Great work exploring Sunny Town! 🎉</h2></div>'+
      '<div class="card">'+
        '<div style="width:110px;margin:0 auto;">'+(pct>=70?ICONS.mascotHappy:ICONS.mascotSad)+'</div>'+
        '<div class="stars-row" aria-hidden="true">'+starRow+'</div>'+
        '<div class="score-big">'+state.score/10+' / '+state.total+'</div>'+
        '<div class="results-msg">'+msg+'</div>'+
        '<div class="results-breakdown">'+
          state.breakdown.map(function(b){ return '<div class="item"><span>'+b.name+'</span><b>'+b.correct+' / '+b.total+'</b></div>'; }).join('')+
        '</div>'+
        '<div class="actions-row">'+
          '<button class="btn btn-go btn-lg" id="againBtn">🔁 Play Again</button>'+
        '</div>'+
      '</div>'+
    '</section>';
  playCelebration();
  launchConfetti();
  document.getElementById('againBtn').addEventListener('click', function(){ playClick(); goTo('start'); });
}

function launchConfetti(){
  const layer = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  const colors = ['#ffc93c','#ff6b5b','#4fb0e8','#3faa5b','#9b6bd6'];
  const n = 90;
  for(let i=0;i<n;i++){
    const el = document.createElement('div');
    const size = 6 + Math.random()*7;
    const left = Math.random()*100;
    const delay = Math.random()*0.6;
    const dur = 2.4 + Math.random()*1.8;
    const rotate = Math.random()*360;
    const color = colors[Math.floor(Math.random()*colors.length)];
    el.style.cssText = 'position:absolute; top:-20px; left:'+left+'vw; width:'+size+'px; height:'+(size*0.5)+'px; background:'+color+'; opacity:.95; transform:rotate('+rotate+'deg); border-radius:2px; animation:confettiFall '+dur+'s ease-in '+delay+'s forwards;';
    layer.appendChild(el);
  }
  if(!document.getElementById('confettiKeyframes')){
    const style = document.createElement('style');
    style.id = 'confettiKeyframes';
    style.textContent = '@keyframes confettiFall{to{ transform:translateY(105vh) rotate(600deg); opacity:.15; }}';
    document.head.appendChild(style);
  }
  setTimeout(function(){ layer.innerHTML=''; }, 5200);
}
